name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-Qt6 PyQt6-sip
        pip install telethon
        pip install aiohttp aiofiles
        pip install requests
        pip install Pillow
        pip install mutagen
        pip install apscheduler
        pip install cryptg
        pip install openai
        pip install PySocks
        pip install pyinstaller

    - name: Remove root __init__.py
      run: |
        if (Test-Path "__init__.py") { Remove-Item "__init__.py" }
        Write-Host "Root __init__.py removed (if existed)"

    - name: Build EXE using spec file
      run: |
        pyinstaller --noconfirm --clean TGAutoPublisher.spec

    - name: Verify EXE
      run: |
        $exePath = "dist\TGAutoPublisher.exe"
        if (-not (Test-Path $exePath)) { throw "EXE not found!" }
        $size = (Get-Item $exePath).length / 1MB
        Write-Host "EXE size: $([math]::Round($size,1)) MB"
        if ($size -lt 10) { throw "EXE too small, build failed" }

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TGAutoPublisher-Windows-EXE
        path: dist/TGAutoPublisher.exe
        retention-days: 30

    - name: Delete old release tag
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete v1.3.0 --yes 2>$null
        git push origin :refs/tags/v1.3.0 2>$null
        Start-Sleep -Seconds 2
      continue-on-error: true

    - name: Create GitHub Release and upload EXE
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create v1.3.0 `
          --title "TG Auto Publisher v1.3.0 (Windows EXE)" `
          --notes "## TG Auto Publisher v1.3.0

        ### 下载使用
        1. 下载 TGAutoPublisher.exe
        2. 从 https://ffmpeg.org/download.html 下载 ffmpeg.exe (Windows版)
        3. 把 ffmpeg.exe 放在 TGAutoPublisher.exe **同一文件夹**
        4. 双击运行

        ### 功能
        - 多账号多频道同时发布 (Bot API / MTProto真实账号)
        - AI自动写作文案 (12家服务商，含无内容限制)
        - 视频裁剪+截图，输出到【已裁剪】文件夹
        - 定时自动发布" `
          dist/TGAutoPublisher.exe
