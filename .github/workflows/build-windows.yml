name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 PyQt6-Qt6 PyQt6-sip
        pip install telethon
        pip install aiohttp aiofiles
        pip install requests
        pip install Pillow
        pip install mutagen
        pip install apscheduler
        pip install cryptg
        pip install openai
        pip install PySocks
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed `
          --name TGAutoPublisher `
          --hidden-import PyQt6 `
          --hidden-import PyQt6.QtWidgets `
          --hidden-import PyQt6.QtCore `
          --hidden-import PyQt6.QtGui `
          --hidden-import PyQt6.sip `
          --hidden-import telethon `
          --hidden-import telethon.sessions `
          --hidden-import telethon.sessions.string `
          --hidden-import aiohttp `
          --hidden-import aiofiles `
          --hidden-import cryptg `
          --hidden-import apscheduler `
          --hidden-import apscheduler.schedulers.background `
          --hidden-import socks `
          --hidden-import PIL `
          --hidden-import PIL.Image `
          --hidden-import core.database `
          --hidden-import core.ai_generator `
          --hidden-import core.video_processor `
          --hidden-import core.telegram_sender `
          --hidden-import core.task_engine `
          --hidden-import core.scheduler `
          --hidden-import ui.styles `
          --hidden-import ui.main_window `
          --hidden-import ui.pages.dashboard `
          --hidden-import ui.pages.channel_page `
          --hidden-import ui.pages.media_page `
          --hidden-import ui.pages.task_page `
          --hidden-import ui.pages.settings_page `
          --hidden-import ui.pages.other_pages `
          --exclude-module tkinter `
          --exclude-module matplotlib `
          --noconfirm --clean `
          main.py

    - name: Verify EXE
      run: |
        $size = (Get-Item "dist\TGAutoPublisher.exe").length / 1MB
        Write-Host "EXE size: $([math]::Round($size,1)) MB"
        if ($size -lt 10) { throw "EXE too small, build may have failed" }

    - name: Upload EXE as Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TGAutoPublisher-Windows-EXE
        path: dist/TGAutoPublisher.exe
        retention-days: 30

    - name: Delete old release if exists
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        $release = gh release view v1.3.0 --json id 2>$null
        if ($LASTEXITCODE -eq 0) {
          gh release delete v1.3.0 --yes
          git push origin :refs/tags/v1.3.0 2>$null
          Start-Sleep -Seconds 3
        }
      continue-on-error: true

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create v1.3.0 `
          --title "TG Auto Publisher v1.3.0 (Windows EXE)" `
          --notes "## TG Auto Publisher v1.3.0 Windows版本

        ### 下载说明
        1. 下载 TGAutoPublisher.exe
        2. 下载 ffmpeg.exe（https://ffmpeg.org/download.html）
        3. 将 ffmpeg.exe 放在 TGAutoPublisher.exe 同一文件夹
        4. 双击 TGAutoPublisher.exe 运行

        ### 功能特性
        - 多账号/多频道同时发布 (Bot API + MTProto真实账号)
        - AI自动写作文案（12家AI服务商，含无内容限制选项）
        - 视频FFmpeg处理（裁剪、截图，输出到已裁剪文件夹）
        - 定时自动发布
        - 支持大文件2GB（MTProto模式）
        - 深色现代UI界面

        ### FFmpeg放置位置
        将 ffmpeg.exe 放在 TGAutoPublisher.exe 同目录，或在设置中配置路径。" `
          dist/TGAutoPublisher.exe
